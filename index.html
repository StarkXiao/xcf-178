<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="极速霓虹 - 赛博朋克风格机车竞速游戏">
  <title>极速霓虹 - Neon Racer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas"></canvas>

    <div class="touch-controls" id="touchControls">
      <button class="touch-btn btn-pause" id="btn-pause">
        <span class="btn-icon">⏸</span>
      </button>
      <div class="d-pad">
        <button class="touch-btn btn-left" id="btn-left">
          <span class="btn-icon">◀</span>
        </button>
        <button class="touch-btn btn-right" id="btn-right">
          <span class="btn-icon">▶</span>
        </button>
      </div>
      <div class="action-pad">
        <button class="touch-btn btn-brake" id="btn-brake">
          <span class="btn-icon">■</span>
          <span class="btn-label">刹车</span>
        </button>
        <button class="touch-btn btn-nitro" id="btn-nitro">
          <span class="btn-icon">⚡</span>
          <span class="btn-label">氮气</span>
        </button>
        <button class="touch-btn btn-accel" id="btn-accel">
          <span class="btn-icon">▲</span>
          <span class="btn-label">加速</span>
        </button>
      </div>
    </div>

    <div class="touch-controls touch-controls-p2" id="touchControlsP2">
      <div class="d-pad">
        <button class="touch-btn btn-left btn-p2" id="btn-left-p2">
          <span class="btn-icon">◀</span>
        </button>
        <button class="touch-btn btn-right btn-p2" id="btn-right-p2">
          <span class="btn-icon">▶</span>
        </button>
      </div>
      <div class="action-pad">
        <button class="touch-btn btn-brake btn-p2" id="btn-brake-p2">
          <span class="btn-icon">■</span>
          <span class="btn-label">刹车</span>
        </button>
        <button class="touch-btn btn-nitro btn-p2" id="btn-nitro-p2">
          <span class="btn-icon">⚡</span>
          <span class="btn-label">氮气</span>
        </button>
        <button class="touch-btn btn-accel btn-p2" id="btn-accel-p2">
          <span class="btn-icon">▲</span>
          <span class="btn-label">加速</span>
        </button>
      </div>
    </div>

    <div class="orientation-hint" id="orientationHint">
      <div class="orientation-hint-content">
        <span class="orientation-icon">📱</span>
        <span>建议横屏游戏</span>
        <span class="orientation-hint-close">✕</span>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/Input.js"></script>
  <script src="js/TouchControlManager.js"></script>
  <script src="js/Track.js"></script>
  <script src="js/Bike.js"></script>
  <script src="js/AI.js"></script>
  <script src="js/Collision.js"></script>
  <script src="js/PoliceAI.js"></script>
  <script src="js/WantedSystem.js"></script>
  <script src="js/WeatherSystem.js"></script>
  <script src="js/Career.js"></script>
    <script src="js/Garage.js"></script>
    <script src="js/Achievement.js"></script>
    <script src="js/ClubQuest.js"></script>
    <script src="js/Renderer.js"></script>
    <script src="js/RaceEditor.js"></script>
    <script src="js/ReplaySystem.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
